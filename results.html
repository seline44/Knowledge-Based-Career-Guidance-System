<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Top Matches for {{ name }}</h1>

    <div class="results">

        {% for career in careers %}
        <div class="career-card">

            <h2>{{ career.title }}</h2>

            <div class="progress">
                <div class="bar" style="width: {{ career.score }}%"></div>
            </div>

            <p>{{ career.score }}% Match</p>

        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
